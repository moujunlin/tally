<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DotGothic16',monospace;
  background:#f5f0e6;color:#6d5843;
  position:relative;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(circle,#d4c9a8 1px,transparent 1px);
  background-size:16px 16px;opacity:.3;pointer-events:none;z-index:0;
}

.app{height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}
.app-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{padding:24px 20px 20px;min-height:100%}

.tab-bar{
  display:flex;border-top:2px solid #c9b88a;
  background:#faf6ed;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:8px 0 6px;border:none;background:none;
  font-family:inherit;cursor:pointer;color:#c9b88a;
}
.tab-item.active{color:#b8960c}
.tab-icon{font-size:18px;line-height:1}
.tab-label{font-size:8px;letter-spacing:1px}

.section-label{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:#a89070;margin-bottom:12px;
}
.btn{
  padding:8px 18px;border:2px solid #6d5843;
  font-family:'DotGothic16',monospace;font-size:11px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
}
.btn-light{background:#faf6ed;color:#6d5843;box-shadow:2px 2px 0 #c9b88a}
.btn-dark{background:#6d5843;color:#f5f0e6;box-shadow:3px 3px 0 #c9b88a}
.btn-gold{background:#b8960c;color:#f5f0e6;box-shadow:3px 3px 0 #8a6f00;border-color:#8a6f00}
.btn:disabled{opacity:.4;cursor:default}
.loading,.empty{font-size:11px;color:#a89070;text-align:center;padding:40px 0}

.connect-page{display:flex;align-items:center;justify-content:center}
.connect-box{text-align:center;width:100%;max-width:300px}
.star-icon{font-size:40px;color:#b8960c;margin-bottom:8px}
.connect-box h1{font-size:28px;letter-spacing:8px;color:#b8960c;margin-bottom:4px}
.connect-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#a89070;margin-bottom:24px}
.connect-box input{
  width:100%;padding:10px 12px;border:2px solid #6d5843;
  background:#faf6ed;font-family:inherit;font-size:12px;
  color:#6d5843;outline:none;margin-bottom:16px;
}
.connect-box input::placeholder{color:#c9b88a}

/* ---- Home ---- */
.dash-page{padding-bottom:80px}
.dash-header{text-align:center;margin-bottom:20px}
.dash-star{font-size:32px;color:#b8960c;animation:glow-pulse 3s ease-in-out infinite}
@keyframes glow-pulse{
  0%,100%{opacity:.8;transform:scale(1)}
  50%{opacity:1;transform:scale(1.1)}
}
.dash-title{font-size:20px;letter-spacing:8px;color:#b8960c;margin:4px 0}
.dash-coin-row{font-size:12px;color:#a89070}
.dash-coin-num{font-size:24px;color:#b8960c}
.dash-coin-label{color:#b8960c}
.dash-progress-bg{height:14px;border:2px solid #6d5843;background:#f5f0e6;margin:8px 0}
.dash-progress-fill{height:100%;background:#b8960c;transition:width .4s}
.dash-pct{font-size:28px;color:#b8960c;text-align:center}
.dash-pct-label{font-size:10px;letter-spacing:2px;color:#a89070;text-align:center}
.coin-history-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px dashed #c9b88a;font-size:11px;
}
.coin-history-date{color:#a89070}
.coin-history-coins{color:#b8960c}

/* ---- Checklist ---- */
.checklist-date{font-size:12px;letter-spacing:2px;color:#b8960c;text-align:center;margin-bottom:16px}
.checklist-group{margin-bottom:16px}
.category-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.category-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#a89070}
.category-bonus{font-size:9px;color:#b8960c}
.check-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border:2px solid #c9b88a;
  background:#faf6ed;margin:4px 0;transition:border-color .2s;
}
.check-row.checked{border-color:#b8960c}
.check-box{
  width:20px;height:20px;border:2px solid #6d5843;
  background:#faf6ed;cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
  font-size:14px;color:#b8960c;transition:all .15s;
}
.check-box.checked{background:#b8960c;border-color:#8a6f00;color:#f5f0e6}
.check-name{flex:1;font-size:12px}
.check-comment{
  width:80px;padding:4px 6px;border:1px solid #c9b88a;
  background:#faf6ed;font-family:inherit;font-size:10px;
  color:#6d5843;outline:none;
}
.check-comment:focus{border-color:#b8960c}
.coins-summary{
  border:2px solid #b8960c;background:#faf6ed;
  padding:12px;margin-top:16px;text-align:center;
  box-shadow:3px 3px 0 #c9b88a;
}
.coins-summary-val{font-size:20px;color:#b8960c}
.coins-summary-label{font-size:10px;letter-spacing:2px;color:#a89070;margin-top:4px}

/* ---- History ---- */
.history-card{
  border:2px solid #c9b88a;background:#faf6ed;
  padding:14px;box-shadow:3px 3px 0 #c9b88a;margin:10px 0;
}
.history-header{display:flex;justify-content:space-between;margin-bottom:8px}
.history-date{font-size:10px;letter-spacing:1px;color:#a89070}
.history-coins{font-size:12px;color:#b8960c}
.history-item{display:flex;gap:6px;align-items:center;font-size:11px;line-height:1.8}
.history-checked{color:#b8960c}
.history-unchecked{color:#c9b88a}
.history-comment-text{font-size:10px;color:#a89070;font-style:italic;margin-left:4px}

/* ---- Gacha ---- */
.gacha-page{text-align:center}
.gacha-page .section-label{text-align:left}
.gacha-machine{display:inline-block;margin:8px 0 16px}
.gacha-svg{filter:drop-shadow(3px 3px 0 #c9b88a)}
.gacha-machine.shaking{animation:shake .15s infinite alternate}
@keyframes shake{
  0%{transform:translateX(-2px) rotate(-1deg)}
  100%{transform:translateX(2px) rotate(1deg)}
}
.gacha-info{margin-bottom:16px}
.gacha-cost{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#a89070;margin-bottom:4px}
.gacha-balance{font-size:11px;color:#b8960c;margin-bottom:12px}
.gacha-result{
  border:2px solid #b8960c;background:#faf6ed;
  padding:16px;margin:16px 0;box-shadow:3px 3px 0 #c9b88a;
}
.result-star{font-size:24px;color:#b8960c;margin-bottom:4px}
.result-type{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#a89070;margin-bottom:6px}
.result-content{font-size:12px;line-height:1.6}
.reward-row{display:flex;align-items:center;gap:8px;font-size:11px}
.reward-star{color:#b8960c}
.reward-type{flex:1}
.reward-date{color:#a89070;font-size:10px}
.reward-wrap{cursor:pointer;margin:0 0 2px}
.reward-wrap .reward-row{padding:8px 0;border-bottom:1px dashed #c9b88a}
.reward-wrap.open .reward-row{border-bottom:none}
.reward-content{
  font-size:12px;line-height:1.6;
  padding:8px 12px 12px;
  border:2px solid #c9b88a;background:#faf6ed;
  margin-bottom:8px;box-shadow:2px 2px 0 #c9b88a;
}
.gacha-pending{
  font-size:11px;color:#a89070;text-align:center;
  padding:12px;border:2px dashed #c9b88a;margin:12px 0;
}

/* ---- Review ---- */
.review-page{padding-bottom:80px}
.review-header{text-align:center;margin-bottom:20px}
.review-icon{font-size:28px;color:#b8960c}
.review-title{font-size:14px;letter-spacing:4px;color:#b8960c;margin:8px 0 4px}
.review-date{font-size:10px;color:#a89070;letter-spacing:1px}
.review-card{
  border:2px solid #c9b88a;background:#faf6ed;
  padding:16px;box-shadow:3px 3px 0 #c9b88a;margin:12px 0;
}
.review-body{font-size:12px;line-height:1.8;color:#6d5843;white-space:pre-wrap}
.review-empty{font-size:11px;color:#a89070;text-align:center;padding:40px 0}
</style>

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
const { useState, useEffect, useCallback, useRef } = React;
const h = React.createElement;

function getAPI() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  try { return decodeURIComponent(hash); } catch (e) { return null; }
}

async function api(path, opts = {}) {
  const base = getAPI();
  if (!base) throw new Error("Not connected");
  const res = await fetch(base + "/" + path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

function ConnectPage({ onConnect }) {
  const [url, setUrl] = useState("");
  const submit = () => {
    if (!url.trim()) return;
    let clean = url.trim().replace(/\/$/, "");
    if (!clean.includes("/functions/v1/tally-api")) clean += "/functions/v1/tally-api";
    window.location.hash = encodeURIComponent(clean);
    onConnect();
  };
  return h("div", { className: "page connect-page" },
    h("div", { className: "connect-box" },
      h("div", { className: "star-icon" }, "✦"),
      h("h1", null, "TALLY"),
      h("p", { className: "connect-sub" }, "Connect your Supabase"),
      h("input", {
        type: "text", placeholder: "https://xxx.supabase.co",
        value: url, onChange: e => setUrl(e.target.value),
        onKeyDown: e => e.key === "Enter" && submit(),
      }),
      h("button", { className: "btn btn-gold", onClick: submit }, "CONNECT")
    )
  );
}

function HomePage({ balance, todayData, coinHistory }) {
  const items = todayData?.items || [];
  const checkedCount = items.filter(i => i.checked).length;
  const totalCount = items.length;
  const pct = totalCount > 0 ? Math.round(checkedCount / totalCount * 100) : 0;
  const coinsToday = todayData?.coins_earned || 0;

  return h("div", { className: "page dash-page" },
    h("div", { className: "dash-header" },
      h("div", { className: "dash-star" }, "✦"),
      h("div", { className: "dash-title" }, "TALLY"),
      h("div", { className: "dash-coin-row" },
        h("span", { className: "dash-coin-num" }, balance),
        h("span", { className: "dash-coin-label" }, " ✦")
      )
    ),
    h("div", { className: "section-label" }, "TODAY'S PROGRESS"),
    h("div", { className: "dash-pct" }, pct + "%"),
    h("div", { className: "dash-progress-bg" },
      h("div", { className: "dash-progress-fill", style: { width: pct + "%" } })
    ),
    h("div", { className: "dash-pct-label" },
      checkedCount + " / " + totalCount + " checked · " + coinsToday + " ✦ earned"
    ),
    (coinHistory && coinHistory.length > 0) && h("div", { style: { marginTop: 24 } },
      h("div", { className: "section-label" }, "RECENT"),
      coinHistory.map(day =>
        h("div", { key: day.date, className: "coin-history-row" },
          h("span", { className: "coin-history-date" }, day.date),
          h("span", { className: "coin-history-coins" }, day.coins_earned + " ✦")
        )
      )
    )
  );
}

function ChecklistPage({ onUpdate }) {
  const [items, setItems] = useState([]);
  const [logs, setLogs] = useState({});
  const [coinsToday, setCoinsToday] = useState(0);
  const [loading, setLoading] = useState(true);
  const today = new Date().toLocaleDateString("en-CA");
  const commentTimers = useRef({});

  const loadData = async () => {
    setLoading(true);
    try {
      const data = await api("checklist-logs?date=" + today);
      setItems(data.items || []);
      const m = {};
      (data.items || []).forEach(i => { m[i.id] = { checked: i.checked || false, comment: i.comment || "" }; });
      setLogs(m);
      setCoinsToday(data.coins_earned || 0);
    } catch (e) {}
    setLoading(false);
  };

  useEffect(() => { loadData(); }, []);

  const toggle = async (itemId, cur) => {
    const next = !cur;
    setLogs(prev => {
      const n = {}; for (var k in prev) n[k] = prev[k];
      n[itemId] = { ...prev[itemId], checked: next };
      return n;
    });
    try {
      const r = await api("checklist-logs", {
        method: "POST",
        body: { item_id: itemId, check_date: today, checked: next, comment: (logs[itemId]?.comment) || "" },
      });
      setCoinsToday(r.coins_today || 0);
      if (onUpdate) onUpdate();
    } catch (e) {
      setLogs(prev => {
        const n = {}; for (var k in prev) n[k] = prev[k];
        n[itemId] = { ...prev[itemId], checked: cur };
        return n;
      });
    }
  };

  const updateComment = (itemId, comment) => {
    setLogs(prev => {
      const n = {}; for (var k in prev) n[k] = prev[k];
      n[itemId] = { ...prev[itemId], comment: comment };
      return n;
    });
    if (commentTimers.current[itemId]) clearTimeout(commentTimers.current[itemId]);
    commentTimers.current[itemId] = setTimeout(() => {
      const log = logs[itemId] || {};
      api("checklist-logs", {
        method: "POST",
        body: { item_id: itemId, check_date: today, checked: log.checked || false, comment: comment },
      }).catch(() => {});
    }, 800);
  };

  const saveComment = (itemId) => {
    if (commentTimers.current[itemId]) { clearTimeout(commentTimers.current[itemId]); commentTimers.current[itemId] = null; }
    const log = logs[itemId];
    if (!log) return;
    api("checklist-logs", {
      method: "POST",
      body: { item_id: itemId, check_date: today, checked: log.checked || false, comment: log.comment || "" },
    }).catch(() => {});
  };

  const grouped = {};
  const catOrder = [];
  items.forEach(item => {
    if (!grouped[item.category]) { grouped[item.category] = []; catOrder.push(item.category); }
    grouped[item.category].push(item);
  });

  const catLabels = { meal: "三餐", medication: "用药", exercise: "运动" };

  if (loading) return h("div", { className: "page" }, h("div", { className: "loading" }, "Loading..."));

  return h("div", { className: "page" },
    h("div", { className: "checklist-date" }, today),
    catOrder.map(cat => {
      const catItems = grouped[cat];
      const allChecked = catItems.every(i => logs[i.id]?.checked);
      const rule = catItems[0]?.coin_rule;
      const bonusText = rule?.type === "all_in_category"
        ? (allChecked ? "✦ +" + rule.coins : "")
        : null;

      return h("div", { key: cat, className: "checklist-group" },
        h("div", { className: "category-header" },
          h("span", { className: "category-label" }, catLabels[cat] || cat.toUpperCase()),
          bonusText && h("span", { className: "category-bonus" }, bonusText)
        ),
        catItems.map(item => {
          const log = logs[item.id] || { checked: false, comment: "" };
          return h("div", { key: item.id, className: "check-row" + (log.checked ? " checked" : "") },
            h("div", {
              className: "check-box" + (log.checked ? " checked" : ""),
              onClick: () => toggle(item.id, log.checked),
            }, log.checked ? "✓" : ""),
            h("span", { className: "check-name" }, item.name),
            h("input", {
              className: "check-comment",
              type: "text",
              placeholder: "...",
              value: log.comment,
              onChange: e => updateComment(item.id, e.target.value),
              onBlur: () => saveComment(item.id),
            })
          );
        })
      );
    }),
    h("div", { className: "coins-summary" },
      h("div", { className: "coins-summary-val" }, coinsToday + " ✦"),
      h("div", { className: "coins-summary-label" }, "TODAY")
    )
  );
}

function HistoryPage() {
  const [history, setHistory] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try { setHistory(await api("checklist-logs?limit=7")); } catch (e) {}
      setLoading(false);
    })();
  }, []);

  if (loading) return h("div", { className: "page" }, h("div", { className: "loading" }, "Loading..."));
  if (!history || history.length === 0) return h("div", { className: "page" },
    h("div", { className: "section-label" }, "HISTORY"),
    h("div", { className: "empty" }, "No records yet")
  );

  return h("div", { className: "page" },
    h("div", { className: "section-label" }, "HISTORY"),
    history.map(day =>
      h("div", { key: day.date, className: "history-card" },
        h("div", { className: "history-header" },
          h("span", { className: "history-date" }, day.date),
          h("span", { className: "history-coins" }, day.coins_earned + " ✦")
        ),
        (day.logs || []).map(log =>
          h("div", { key: log.id, className: "history-item" },
            h("span", { className: log.checked ? "history-checked" : "history-unchecked" },
              log.checked ? "✓" : "○"
            ),
            h("span", null, log.tally_checklist_items?.name || "—"),
            log.comment && h("span", { className: "history-comment-text" }, log.comment)
          )
        )
      )
    )
  );
}

function GachaPage({ balance, rewards, onPlay, loading }) {
  const [playing, setPlaying] = useState(false);
  const [justGot, setJustGot] = useState(null);
  const canPlay = balance >= 5;

  const handlePlay = async () => {
    if (!canPlay || playing) return;
    setPlaying(true);
    setJustGot(null);
    try {
      const reward = await api("rewards", {
        method: "POST",
        body: { coins_spent: 5, reward_type: "pending", reward_content: "", status: "pending" },
      });
      await new Promise(r => setTimeout(r, 1800));
      setJustGot(reward);
    } catch (e) { alert(e.message); }
    setPlaying(false);
    if (onPlay) onPlay();
  };

  const pendingCount = (rewards || []).filter(r => r.status === "pending").length;
  const filledRewards = (rewards || []).filter(r => r.status === "filled");
  const [expanded, setExpanded] = useState({});

  return h("div", { className: "page gacha-page" },
    h("div", { className: "section-label" }, "GACHA"),
    h("div", { className: "gacha-machine" + (playing ? " shaking" : "") },
      h("svg", { width: "140", height: "196", viewBox: "0 0 120 168", className: "gacha-svg" },

    ),
    pendingCount > 0 && !justGot && h("div", { className: "gacha-pending" },
      pendingCount + " capsule" + (pendingCount > 1 ? "s" : "") + " waiting for Lori"
    ),
    filledRewards && filledRewards.length > 0 && h("div", { className: "past-rewards" },
      h("div", { className: "section-label", style: { marginTop: 24 } }, "PAST REWARDS"),
      filledRewards.map(r =>
        h("div", {
          key: r.id,
          className: "reward-wrap" + (expanded[r.id] ? " open" : ""),
          onClick: () => setExpanded(prev => {
            const n = {}; for (var k in prev) n[k] = prev[k];
            n[r.id] = !prev[r.id]; return n;
          }),
        },
          h("div", { className: "reward-row" },
            h("span", { className: "reward-star" }, "✦"),
            h("span", { className: "reward-type" }, r.reward_type),
            h("span", { className: "reward-date" }, new Date(r.created_at).toLocaleDateString("en-CA"))
          ),
          expanded[r.id] && h("div", { className: "reward-content" }, r.reward_content)
        )
      )
    )
  );
}

function ReviewPage() {
  const [review, setReview] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const data = await api("reviews");
        if (data && data.length > 0) setReview(data[0]);
      } catch (e) {}
      setLoading(false);
    })();
  }, []);

  if (loading) return h("div", { className: "page" }, h("div", { className: "loading" }, "Loading..."));

  return h("div", { className: "page review-page" },
    h("div", { className: "review-header" },
      h("div", { className: "review-icon" }, "◇"),
      h("div", { className: "review-title" }, "LORI'S REVIEW")
    ),
    review ? h("div", null,
      h("div", { className: "review-date" },
        review.week_start + " → " + review.week_end
      ),
      h("div", { className: "review-card" },
        h("div", { className: "review-body" }, review.lux_comment || "（还没写）")
      )
    ) : h("div", { className: "review-empty" }, "还没有 review")
  );
}

function App() {
  const [connected, setConnected] = useState(!!getAPI());
  const [tab, setTab] = useState("home");
  const [balance, setBalance] = useState(0);
  const [todayData, setTodayData] = useState(null);
  const [coinHistory, setCoinHistory] = useState([]);
  const [rewards, setRewards] = useState([]);
  const [loadingRv, setLoadingRv] = useState(false);

  const loadSettings = useCallback(async () => {
    if (!getAPI()) return;
    try { const s = await api("settings"); setBalance(s.coins_balance || 0); } catch (e) {}
  }, []);

  const loadToday = useCallback(async () => {
    const d = new Date().toLocaleDateString("en-CA");
    try { setTodayData(await api("checklist-logs?date=" + d)); } catch (e) {}
  }, []);

  const loadHistory = useCallback(async () => {
    try { setCoinHistory(await api("checklist-logs?limit=7")); } catch (e) {}
  }, []);

  const loadRewards = useCallback(async () => {
    setLoadingRv(true);
    try { setRewards(await api("rewards")); } catch (e) {}
    setLoadingRv(false);
  }, []);

  useEffect(() => {
    if (connected) { loadSettings(); loadToday(); }
  }, [connected]);

  useEffect(() => {
    if (!connected) return;
    if (tab === "home") { loadSettings(); loadToday(); loadHistory(); }
    if (tab === "checklist") { loadToday(); }
    if (tab === "gacha") { loadRewards(); loadSettings(); }
  }, [tab]);

  if (!connected) return h(ConnectPage, { onConnect: () => setConnected(true) });

  const tabs = [
    { id: "home", icon: "✦" },
    { id: "checklist", icon: "✓" },
    { id: "history", icon: "≡" },
    { id: "review", icon: "◇" },
    { id: "gacha", icon: "◎" },
  ];

  let page = null;
  switch (tab) {
    case "home":
      page = h(HomePage, { balance, todayData, coinHistory });
      break;
    case "checklist":
      page = h(ChecklistPage, { onUpdate: () => { loadSettings(); } });
      break;
    case "history":
      page = h(HistoryPage);
      break;
    case "review":
      page = h(ReviewPage);
      break;
    case "gacha":
      page = h(GachaPage, {
        balance, rewards, loading: loadingRv,
        onPlay: () => { loadRewards(); loadSettings(); },
      });
      break;
  }

  return h("div", { className: "app" },
    h("div", { className: "app-content" }, page),
    h("nav", { className: "tab-bar" },
      tabs.map(t =>
        h("button", {
          key: t.id,
          className: "tab-item" + (tab === t.id ? " active" : ""),
          onClick: () => setTab(t.id),
        },
          h("span", { className: "tab-icon" }, t.icon),
          h("span", { className: "tab-label" }, t.id.toUpperCase())
        )
      )
    )
  );
}

ReactDOM.render(h(App), document.getElementById("root"));
</script>
</body>
