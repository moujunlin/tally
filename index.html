.loading,.empty{font-size:11px;color:#a89070;text-align:center;padding:40px 0}

/* ---- Connect Page ---- */
.connect-page{display:flex;align-items:center;justify-content:center}
.connect-box{text-align:center;width:100%;max-width:300px}
